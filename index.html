<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="score-column">
                <h3>HOME</h3>
                <div id="home-score" class="score-number">
                    0
                </div>
                <div class="add-points">
                    <button data-add="1" data-team="home" class="plus-point">+1</button>
                    <button data-add="2" data-team="home" class="plus-point">+2</button>
                    <button data-add="3" data-team="home" class="plus-point">+3</button>
                </div>
            </div>
            <div>
                <div class="score-column">
                <h3>GUEST</h3>
                <div id="guest-score" class="score-number">
                    0
                </div>
                <div class="add-points">
                    <button data-add="1" data-team="guest" class="plus-point">+1</button>
                    <button data-add="2" data-team="guest" class="plus-point">+2</button>
                    <button data-add="3" data-team="guest" class="plus-point">+3</button>
                </div>
            </div>
            </div>
        </div>
        <script src="index.js" defer></script>
    </body>
</html>
